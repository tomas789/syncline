name: CI

on:
  push:
    # debug branch — focused only on reproducing the
    # `propagates deletes CLI → Obsidian` flake on Linux GHA runners.
    # Restore the full workflow before merging anywhere.
    branches: [main, release/v1, 'debug/**']
  pull_request:
    branches: [main, release/v1]
  workflow_dispatch:

jobs:
  flake-repro:
    name: Reproduce propagates-deletes flake
    runs-on: ubuntu-latest
    # The whole point is to keep rerunning the suite. Avoid bailing out
    # of the matrix or burning credits on early-failed jobs.
    # The job runs the e2e spec in a tight inner loop so we don't pay
    # the apt + cargo + wasm + node setup cost per trial. 6 hours is
    # the GHA hard cap for a single job, but we exit on the first
    # test-level failure so we usually finish much sooner.
    timeout-minutes: 350

    env:
      # Crank up logging on the syncline binary spawned by basic.e2e.ts
      # via `cargo run`. Picked up because the binary calls
      # `tracing_subscriber::fmt::init()`.
      RUST_LOG: trace,sqlx=warn,hyper=warn,tungstenite=warn,h2=warn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install Linux desktop deps + xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev xvfb

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-index-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-target-

      # No `cargo test`, no `cargo build --release`, no wasm-pack,
      # no plugin lint, no plugin build — basic.e2e.ts spawns the
      # syncline binary via `cargo run`, which builds dev itself, and
      # the plugin under test isn't touched.
      #
      # Deliberately skipped for this branch so the job is smaller
      # and we burn fewer cycles per rerun.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Obsidian Plugin dependencies
        run: |
          cd obsidian-plugin
          npm ci

      - name: Build Obsidian Plugin WASM
        run: |
          cd obsidian-plugin
          npm run build:wasm

      - name: Build Obsidian Plugin
        run: |
          cd obsidian-plugin
          npx rollup --config rollup.config.js

      - name: Pre-build syncline binary (so cargo run is a no-op per loop)
        # basic.e2e.ts spawns `cargo run --bin syncline -- ...`. Without
        # a pre-build, every iteration of the inner loop relinks the
        # binary and the test pays 20-40 s of cargo time. With this
        # step the dev binary is in target/debug and `cargo run`
        # short-circuits to "Finished in 0.0s".
        run: cargo build --bin syncline

      - name: Loop basic.e2e.ts until a test-level failure
        # We're hunting an intermittent test flake. Each `xvfb-run` /
        # `wdio` invocation costs ~3-4 min; rebuilds + apt + node setup
        # add another 3-4 min on top. By looping the spec inside ONE
        # job we amortise the setup across many trials.
        #
        # Stop conditions:
        #   - Test failure (exit non-zero) → save logs, exit the job
        #     with a non-zero code so the workflow run is marked failed
        #     and we can inspect the dump from `actions/upload-artifact`.
        #   - The job's `timeout-minutes` expires (set above).
        #
        # Iteration budget: capped at MAX_ITERS so a non-flaky run
        # eventually returns success rather than running until the
        # 6 h job limit.
        run: |
          cd e2e
          npm ci
          MAX_ITERS=80
          for i in $(seq 1 $MAX_ITERS); do
            echo "::group::iteration $i / $MAX_ITERS"
            iter_log=/tmp/wdio-iter-$i.log
            if xvfb-run --auto-servernum ./node_modules/.bin/wdio run wdio.conf.ts \
                 --spec ./test/specs/basic.e2e.ts 2>&1 | tee "$iter_log"; then
              echo "::endgroup::"
              echo "iter $i passed"
            else
              echo "::endgroup::"
              echo "::error::iter $i FAILED — dumping log tail"
              tail -300 "$iter_log"
              # Save all iteration logs (the failing one + any prior)
              # so we have the full picture if you want to diff.
              mkdir -p /tmp/wdio-logs
              cp /tmp/wdio-iter-*.log /tmp/wdio-logs/ || true
              exit 1
            fi
            # Settle ports / chromedriver / Obsidian processes before
            # the next iteration. Without this, a TIME_WAIT'd 3040
            # binds intermittently fail.
            sleep 3
          done
          echo "all $MAX_ITERS iterations passed"

      - name: Upload all iteration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wdio-iter-logs
          path: /tmp/wdio-logs/
          if-no-files-found: ignore
