name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install macOS/Linux Desktop Dependencies
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
          fi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Run tests
        run: cargo test

      - name: Build native binaries
        run: cargo build --release -p syncline

      - name: Build WASM library
        run: wasm-pack build syncline --release --target web --out-dir pkg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Obsidian Plugin
        run: |
          cd obsidian-plugin
          npm ci
          npm run build

      - name: Run E2E Tests
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get install -y xvfb
          fi
          cd e2e
          npm ci
          xvfb-run --auto-servernum npm test

      - name: Upload syncline artifact
        uses: actions/upload-artifact@v4
        with:
          name: syncline
          path: target/release/syncline

      - name: Upload WASM library artifact
        uses: actions/upload-artifact@v4
        with:
          name: syncline-wasm
          path: syncline/pkg
