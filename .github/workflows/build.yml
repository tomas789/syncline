name: CI

on:
  push:
    # debug branch — focused only on reproducing the
    # `propagates deletes CLI → Obsidian` flake on Linux GHA runners.
    # Restore the full workflow before merging anywhere.
    branches: [main, release/v1, 'debug/**']
  pull_request:
    branches: [main, release/v1]
  workflow_dispatch:

jobs:
  flake-repro:
    name: Reproduce propagates-deletes flake
    runs-on: ubuntu-latest
    # The whole point is to keep rerunning the suite. Avoid bailing out
    # of the matrix or burning credits on early-failed jobs.
    timeout-minutes: 30

    env:
      # Crank up logging on the syncline binary spawned by basic.e2e.ts
      # via `cargo run`. Picked up because the binary calls
      # `tracing_subscriber::fmt::init()`.
      RUST_LOG: trace,sqlx=warn,hyper=warn,tungstenite=warn,h2=warn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install Linux desktop deps + xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev xvfb

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-index-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-target-

      # No `cargo test`, no `cargo build --release`, no wasm-pack,
      # no plugin lint, no plugin build — basic.e2e.ts spawns the
      # syncline binary via `cargo run`, which builds dev itself, and
      # the plugin under test isn't touched.
      #
      # Deliberately skipped for this branch so the job is smaller
      # and we burn fewer cycles per rerun.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Obsidian Plugin dependencies
        run: |
          cd obsidian-plugin
          npm ci

      - name: Build Obsidian Plugin WASM
        run: |
          cd obsidian-plugin
          npm run build:wasm

      - name: Build Obsidian Plugin
        run: |
          cd obsidian-plugin
          npx rollup --config rollup.config.js

      - name: Run only basic.e2e.ts (the spec containing the flaky test)
        run: |
          cd e2e
          npm ci
          xvfb-run --auto-servernum ./node_modules/.bin/wdio run wdio.conf.ts \
            --spec ./test/specs/basic.e2e.ts
