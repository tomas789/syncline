on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # default is github.token but that doesn't trigger other CI workflows on PR creation/merge
          token: ${{ secrets.GITHUB_TOKEN }}
          # The configuration is defined in release-please-config.json
          # but we need to explicitly tell the action we are using standard JSON config
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            binary_name: syncline-linux-amd64
            build_plugin: true
          - platform: macos-latest
            binary_name: syncline-macos-amd64
            build_plugin: false
          - platform: windows-latest
            binary_name: syncline-windows-amd64.exe
            build_plugin: false
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        if: matrix.build_plugin
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Node.js
        if: matrix.build_plugin
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Rust binary
        run: cargo build --release -p syncline

      - name: Build Obsidian Plugin
        if: matrix.build_plugin
        run: |
          cd obsidian-plugin
          npm install
          npm run build

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir artifacts
          cp target/release/syncline artifacts/${{ matrix.binary_name }}

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir artifacts
          copy target\release\syncline.exe artifacts\${{ matrix.binary_name }}

      - name: Prepare plugin artifacts
        if: matrix.build_plugin
        run: |
          cp obsidian-plugin/main.js artifacts/main.js
          cp manifest.json artifacts/manifest.json
          cp obsidian-plugin/styles.css artifacts/styles.css

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tauri-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ needs.release-please.outputs.tag_name }}
