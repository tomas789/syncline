site_name: Syncline (live sync)
site_description: A privacy-first, self-hosted synchronization system for Obsidian vaults. Powered by Rust and CRDTs for seamless, conflict-free merging across devices, even after extended offline periods.
theme:
  name: material
  logo: logo.jpg
  favicon: favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.top

nav:
  - Introduction & Usage: index.md
  - Architecture & How It Works: how-it-works.md
  - Protocol: PROTOCOL.md
  - Formal Verification: formal-verification.md
  - Operations:
      - Backups: backups.md
      - Encryption: encryption.md
      - Nginx Reverse Proxy: nginx.md
  - Future Work: future-work.md
